name: Steg CI Build

on: [push]

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.version_check.outputs.should_build }}
      version: ${{ steps.version_check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Extract Version and Compare
        id: version_check
        run: |
          NEW_VER=$(grep -oP 'project\(stegnocode VERSION \K[0-9.]+' CMakeLists.txt)
          echo "Current version: $NEW_VER"
          
          git checkout HEAD^ CMakeLists.txt || true
          OLD_VER=$(grep -oP 'project\(stegnocode VERSION \K[0-9.]+' CMakeLists.txt || echo "0.0.0")
          git checkout HEAD CMakeLists.txt
          
          echo "Old version: $OLD_VER"
          
          if [ "$NEW_VER" != "$OLD_VER" ]; then
            echo "Version bumped. Starting build process."
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "version=$NEW_VER" >> $GITHUB_OUTPUT
          else
            echo "No version change. Skipping build."
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: steg_winx86-64_${{ needs.check-version.outputs.version }}.exe
            triplet: x64-windows
          - os: ubuntu-latest
            artifact_name: steg_linux86-64_${{ needs.check-version.outputs.version }}
            triplet: x64-linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libx11-dev libxcursor-dev libxinerama-dev libxrandr-dev libxi-dev libgl1-mesa-dev libglu1-mesa-dev

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build Project
        run: cmake --build build --config Release

      - name: Prepare Artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          # On suppose que l'exécutable principal est dans build/steg/
          cp build/steg/steg ./build/${{ matrix.artifact_name }}

      - name: Prepare Artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          copy build\steg\Release\steg.exe build\${{ matrix.artifact_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: build/${{ matrix.artifact_name }}